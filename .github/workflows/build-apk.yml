name: Build TVBox APK - Single Debug Variant (arm64 generic normal debug)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 强烈推荐改用官方 Gradle Action（比手动 cache 更智能、更少缓存问题）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false        # 允许写入缓存
          gradle-home-cache-includes:   # 可选：更精确控制缓存内容
            - caches
            - wrapper

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      # 强制彻底清理（非常重要）
      - name: Clean previous builds
        run: ./gradlew clean --no-build-cache --no-configuration-cache

      # 构建步骤：关键是加上 --no-build-cache --no-configuration-cache
      - name: Assemble single debug variant
        run: |
          ./gradlew assembleArm64GenericNormalDebug \
            --parallel \
            --configure-on-demand \
            --max-workers=4 \
            --stacktrace \
            --info \
            --no-build-cache \
            --no-configuration-cache > compile_log.txt 2>&1

      # 以下打印、错误提取、上传部分保持不变（你可以直接复制粘贴）
      - name: Print all generated APK locations
        if: always()
        run: |
          echo "======================================"
          echo "寻找所有 .apk 文件（完整路径）："
          find app/build/outputs -type f -name "*.apk" 2>/dev/null || echo "未找到任何 .apk 文件"
          echo ""
          echo "======================================"
          echo "outputs/apk 目录结构："
          ls -laR app/build/outputs/apk 2>/dev/null || echo "目录不存在或为空"
          echo "======================================"

      - name: Extract & Print Compile Errors (on failure)
        if: failure()
        run: |
          echo "=== BUILD FAILED - ERROR SUMMARY ==="
          echo ""
          grep -i -B 5 -A 30 "error:" compile_log.txt | head -n 100 || echo "No 'error:' lines found"
          echo ""
          grep -B 10 -A 30 "failed for task" compile_log.txt || echo "No failed task found"
          echo ""
          tail -n 300 compile_log.txt
          echo "=== END OF ERROR SUMMARY ==="

      - name: Prepare single flat APK for upload (on success only)
        if: success()
        run: |
          APK_SOURCE=$(find app/build/outputs -type f -name "*arm64*.apk" | head -n 1)
          if [ -n "$APK_SOURCE" ] && [ -f "$APK_SOURCE" ]; then
            mv "$APK_SOURCE" TVBox-debug-arm64-generic-normal.apk
            echo "APK prepared:"
            ls -lh TVBox-debug-arm64-generic-normal.apk
          else
            echo "No matching arm64 APK found"
            exit 1
          fi

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TVBox-debug-arm64-generic-normal
          path: TVBox-debug-arm64-generic-normal.apk
          if-no-files-found: warn
          retention-days: 7
